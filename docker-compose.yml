services:
  wp_db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - wp_db_data:/var/lib/mysql
    networks:
      - internal

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - wp_db
    environment:
      WORDPRESS_DB_HOST: wp_db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: 0
    volumes:
      - wp_core:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./php-config/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    labels:
      - traefik.enable=true
      - traefik.http.routers.wpsandbox.rule=Host(`wpsandbox.spaces.community`)
      - traefik.http.routers.wpsandbox.entrypoints=websecure
      - traefik.http.services.wpsandbox.loadbalancer.server.port=80
    networks:
      - internal

volumes:
  wp_db_data:
  wp_core:

networks:
  internal:
    driver: bridge
